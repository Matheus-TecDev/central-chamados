services:
  postgres:
    image: postgres:16
    container_name: central_chamados_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-central_chamados}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - central_chamados_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-central_chamados}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: central_chamados_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL obrigatoria}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY obrigatoria}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost,http://localhost:5173}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Administrador}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD obrigatoria}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads/ticket_attachments}
      MAX_ATTACHMENT_SIZE_BYTES: ${MAX_ATTACHMENT_SIZE_BYTES:-26214400}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ticket_uploads:/app/uploads
    networks:
      - central_chamados_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: central_chamados_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    depends_on:
      - backend
    networks:
      - central_chamados_net

  nginx:
    image: nginx:1.27-alpine
    container_name: central_chamados_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - central_chamados_net

volumes:
  postgres_data:
  ticket_uploads:

networks:
  central_chamados_net:
    driver: bridge
