services:
  postgres:
    image: postgres:16
    container_name: central_chamados_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-central_chamados}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - central_chamados_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-central_chamados}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: central_chamados_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL obrigatoria}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY obrigatoria}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost,http://localhost:5173}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Administrador}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD obrigatoria}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads/ticket_attachments}
      MAX_ATTACHMENT_SIZE_BYTES: ${MAX_ATTACHMENT_SIZE_BYTES:-26214400}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ticket_uploads:/app/uploads
    networks:
      - central_chamados_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: central_chamados_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    depends_on:
      - backend
    networks:
      - central_chamados_net

  nginx:
    image: nginx:1.27-alpine
    container_name: central_chamados_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - central_chamados_net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: central_chamados_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - central_chamados_net

  grafana:
    image: grafana/grafana:11.3.1
    container_name: central_chamados_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - central_chamados_net

volumes:
  postgres_data:
  ticket_uploads:
  prometheus_data:
  grafana_data:

networks:
  central_chamados_net:
    driver: bridge
